services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    # /dev/dri wird fuer Hardware-Transcoding (Intel QuickSync) durchgereicht.
    # Falls im Container Rechtefehler auf renderD128 auftreten, die Render-Gruppe
    # des Hosts ergaenzen (siehe Handbuch, QuickSync-Troubleshooting):
    #   group_add:
    #     - "<GID der Gruppe render auf dem Host>"
    devices:
      - /dev/dri:/dev/dri
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # Hinweis: Das Standard-Image nutzt KEINE GPU. Das Durchreichen von /dev/dri
    # an diesen Container hat mit dem Standard-Image keinen Effekt und wurde
    # daher bewusst entfernt. Fuer Intel-ML-Beschleunigung waere stattdessen das
    # Image-Suffix "-openvino" zusammen mit hwaccel.ml.yml noetig. Auf dem
    # Wyse 5070 ist CPU-ML in der Regel ausreichend und stabil.
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - ${MODEL_CACHE_LOCATION}:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
